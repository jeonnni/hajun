# =====================================================================
# nginx.conf — Nginx 설정 파일
# HTTPS 요청을 받아 FastAPI(8000)로 전달합니다.
# 프론트엔드 정적 파일도 Nginx가 직접 서빙합니다.
#
# EC2 서버에서 설치 방법:
#   sudo cp nginx.conf /etc/nginx/sites-available/hajun
#   sudo ln -s /etc/nginx/sites-available/hajun /etc/nginx/sites-enabled/
#   sudo rm /etc/nginx/sites-enabled/default  # 기본 설정 제거
#   sudo nginx -t          # 문법 검사
#   sudo systemctl reload nginx
#
# HTTPS 인증서 발급 (도메인 연결 후):
#   sudo certbot --nginx -d yourdomain.com
# =====================================================================

server {
    listen 80;
    server_name YOUR_DOMAIN.com;  # ← 여기에 도메인 입력 (예: hajun.com)

    # certbot이 자동으로 HTTPS 설정을 추가하는 위치
    # (certbot 실행 후 아래 내용이 자동으로 채워짐)

    # /api/* 요청 → FastAPI 백엔드로 전달
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 대용량 파일 업로드 허용 (기본 1MB → 500MB로 확장)
        client_max_body_size 500M;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
    }

    # 그 외 모든 요청 → React 프론트엔드 정적 파일 서빙
    location / {
        root /opt/hajun/frontend/dist;
        index index.html;
        # React Router를 위한 설정 (새로고침해도 404 안 뜨도록)
        try_files $uri $uri/ /index.html;
    }
}
